name: Release project skills

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-project-skills:
    name: Package project-local Codex skills
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like vX.Y.Z or vX.Y.Z-prerelease: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure requested tag is checked out
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout "${{ steps.release.outputs.tag }}"

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/package_project_skills.py --version "${{ steps.release.outputs.tag }}"
          test -f dist/flutter-mvvm-skills.tar.gz

      - name: Verify release asset contents
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf dist/flutter-mvvm-skills.tar.gz > /tmp/project-skills-files.txt
          if grep -q 'flutter-mvvm-template' /tmp/project-skills-files.txt; then
            echo "Release asset must not contain flutter-mvvm-template." >&2
            exit 1
          fi
          grep -q '^\.codex/flutter-mvvm-skills\.json$' /tmp/project-skills-files.txt
          grep -q '^scripts/update-codex-skills\.sh$' /tmp/project-skills-files.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/flutter-mvvm-skills.tar.gz --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/flutter-mvvm-skills.tar.gz \
              --title "$RELEASE_TAG" \
              --notes "Flutter MVVM project-local Codex skills release for $RELEASE_TAG." \
              --verify-tag
          fi
